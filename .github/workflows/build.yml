name: Build OTC Zimbadev 15.03 (Windows x64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (VS2022)
        uses: ilammy/msvc-dev-cmd@v1

      # Cache do vcpkg para acelerar builds seguintes
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg
          key: vcpkg-cache-${{ runner.os }}-1

      # Clona e inicializa o vcpkg se não existir no cache
      - name: Bootstrap vcpkg
        shell: cmd
        run: |
          if not exist C:\vcpkg (
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          )

      # Instala dependências necessárias do OTClient (x64)
      - name: vcpkg install deps
        shell: cmd
        run: |
          C:\vcpkg\vcpkg.exe install ^
            sfml:x64-windows ^
            physfs:x64-windows ^
            glew:x64-windows ^
            openal-soft:x64-windows ^
            libogg:x64-windows ^
            libvorbis:x64-windows ^
            zlib:x64-windows ^
            luajit:x64-windows

      # Configura e compila usando Visual Studio (sem Ninja)
      - name: Configure (CMake)
        shell: cmd
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          $exe = Get-ChildItem -Recurse -Path build -Filter *.exe | Where-Object { $_.Name -match "otclient" } | Select-Object -First 1
          if (-not $exe) { throw "otclient.exe não encontrado no diretório de build." }
          Copy-Item $exe.FullName package\
          if (Test-Path "data") { Copy-Item data package\data -Recurse }
          if (Test-Path "modules") { Copy-Item modules package\modules -Recurse }
          if (Test-Path "mods") { Copy-Item mods package\mods -Recurse }
          Compress-Archive -Path package\* -DestinationPath otc-win64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otc-win64
          path: otc-win64.zip
